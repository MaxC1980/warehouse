{% extends "base.html" %}

{% block title %}出库台账 - 仓库管理系统{% endblock %}

{% block content %}
<div class="page-header">
    <h1>出库台账</h1>
    <button onclick="exportExcel()" class="btn btn-primary">导出Excel</button>
</div>

<div class="filter-bar">
    <select id="status-filter" onchange="loadOrders()">
        <option value="">全部状态</option>
        <option value="pending">待审核</option>
        <option value="approved">已审核</option>
    </select>
    <span>出库日期</span>
    <input type="date" id="start-date" placeholder="开始日期">
    <input type="date" id="end-date" placeholder="结束日期">
    <button onclick="setThisMonth()" class="btn btn-sm">本月</button>
    <button onclick="setLastMonth()" class="btn btn-sm">上月</button>
    <input type="text" id="search-keyword" placeholder="搜索物料编码、名称、品牌、规格">
    <button onclick="resetFilter()" class="btn btn-secondary">重置</button>
    <select id="per-page" onchange="loadOrders()">
        <option value="15" selected>15条/页</option>
        <option value="50">50条/页</option>
        <option value="100">100条/页</option>
    </select>
    <button onclick="loadOrders()" class="btn btn-secondary">搜索</button>
</div>

<div class="data-table">
    <table>
        <thead>
            <tr>
                <th>出库单号</th>
                <th>部门</th>
                <th>领用人</th>
                <th>用途</th>
                <th>出库日期</th>
                <th>物料编码</th>
                <th>物料名称</th>
                <th>品牌</th>
                <th>规格型号</th>
                <th>单位</th>
                <th>批次号</th>
                <th>申请用量</th>
                <th>实际用量</th>
                <th>领用毛重</th>
                <th>状态</th>
            </tr>
        </thead>
        <tbody id="orders-tbody"></tbody>
    </table>
</div>

<div class="pagination" id="pagination"></div>
{% endblock %}

{% block scripts %}
<script>
let currentPage = 1;

async function loadOrders(page = 1) {
    currentPage = page;
    const status = document.getElementById('status-filter').value;
    const startDate = document.getElementById('start-date').value;
    const endDate = document.getElementById('end-date').value;
    const keyword = document.getElementById('search-keyword').value.trim();
    const perPage = document.getElementById('per-page').value;

    const params = new URLSearchParams({ page, per_page: perPage });
    if (status) params.append('status', status);
    if (startDate) params.append('start_date', startDate);
    if (endDate) params.append('end_date', endDate);
    if (keyword) params.append('keyword', keyword);

    const data = await apiRequest(`/out-orders/detail?${params}`);
    if (data) {
        renderOrders(data.items);
        renderPagination('pagination', data.total, data.page, perPage, 'loadOrders');
    }
}

function exportExcel() {
    const status = document.getElementById('status-filter').value;
    const startDate = document.getElementById('start-date').value;
    const endDate = document.getElementById('end-date').value;
    const keyword = document.getElementById('search-keyword').value.trim();

    const params = new URLSearchParams({ page: 1, per_page: 10000 });
    if (status) params.append('status', status);
    if (startDate) params.append('start_date', startDate);
    if (endDate) params.append('end_date', endDate);
    if (keyword) params.append('keyword', keyword);

    window.location.href = '/api/out-orders/detail/export?' + params.toString();
}

initDateRange('start-date', 'end-date', loadOrders);

function resetFilter() {
    window.location.href = '/out-order-details';
}

function renderOrders(orders) {
    const tbody = document.getElementById('orders-tbody');
    if (orders.length === 0) {
        tbody.innerHTML = '<tr><td colspan="15">暂无数据</td></tr>';
        return;
    }

    let html = '';
    orders.forEach(o => {
        if (!o.items || o.items.length === 0) {
            html += `<tr>
                <td>${o.order_no}</td>
                <td>${o.department || ''}</td>
                <td>${o.receiver || ''}</td>
                <td>${o.purpose || ''}</td>
                <td>${o.receiver_date || ''}</td>
                <td colspan="6"></td>
                <td></td>
                <td><span class="status ${o.status}">${getStatusText(o.status)}</span></td>
            </tr>`;
        } else {
            o.items.forEach((item, idx) => {
                if (idx === 0) {
                    html += `<tr>
                        <td rowspan="${o.items.length}">${o.order_no}</td>
                        <td rowspan="${o.items.length}">${o.department || ''}</td>
                        <td rowspan="${o.items.length}">${o.receiver || ''}</td>
                        <td rowspan="${o.items.length}">${o.purpose || ''}</td>
                        <td rowspan="${o.items.length}">${o.receiver_date || ''}</td>
                        <td>${item.material_code || ''}</td>
                        <td>${item.material_name || ''}</td>
                        <td>${item.manufacturer || ''}</td>
                        <td>${item.spec || ''}</td>
                        <td>${item.unit || ''}</td>
                        <td>${item.batch_no || ''}</td>
                        <td>${item.requested_quantity || 0}</td>
                        <td>${item.actual_quantity || 0}</td>
                        <td rowspan="${o.items.length}">${item.initial_gross_weight || ''}</td>
                        <td rowspan="${o.items.length}"><span class="status ${o.status}">${getStatusText(o.status)}</span></td>
                    </tr>`;
                } else {
                    html += `<tr>
                        <td>${item.material_code || ''}</td>
                        <td>${item.material_name || ''}</td>
                        <td>${item.manufacturer || ''}</td>
                        <td>${item.spec || ''}</td>
                        <td>${item.unit || ''}</td>
                        <td>${item.batch_no || ''}</td>
                        <td>${item.requested_quantity || 0}</td>
                        <td>${item.actual_quantity || 0}</td>
                    </tr>`;
                }
            });
        }
    });
    tbody.innerHTML = html;
}

function getStatusText(status) {
    const map = {
        pending: '待审核',
        approved: '已审核',
        completed: '已完成'
    };
    return map[status] || status;
}

setThisMonth();
</script>
{% endblock %}
