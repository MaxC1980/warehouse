{% extends "base.html" %}

{% block title %}{{ '编辑' if category_id else '新增' }}物料大类 - 仓库管理系统{% endblock %}

{% block content %}
<div class="page-header">
    <h1>{{ '编辑' if category_id else '新增' }}物料大类</h1>
</div>

<form id="category-form" onsubmit="handleSubmit(event)">
    <div class="form-grid">
        <div class="form-group">
            <label>分类代码 *</label>
            <input type="text" name="code" required maxlength="2" placeholder="2位数字，如：01">
        </div>
        <div class="form-group">
            <label>分类名称 *</label>
            <input type="text" name="name" required placeholder="如：原材料">
        </div>
    </div>

    <div class="form-actions">
        <button type="submit" class="btn btn-primary">保存</button>
        <a href="/category-major" class="btn btn-secondary">取消</a>
    </div>
</form>
{% endblock %}

{% block scripts %}
<script>
const categoryId = {{ category_id if category_id else 'null' }};

async function loadCategory() {
    if (!categoryId) return;
    const categories = await apiRequest('/categories');
    if (categories) {
        const category = categories.find(c => c.id === categoryId);
        if (category) {
            const form = document.getElementById('category-form');
            form.code.value = category.code;
            form.name.value = category.name;
        }
    }
}

async function handleSubmit(e) {
    e.preventDefault();
    const form = e.target;
    const data = {
        code: form.code.value,
        name: form.name.value,
        level: 1,
        parent_code: null
    };

    const url = categoryId ? `/categories/${categoryId}` : '/categories';
    const method = categoryId ? 'PUT' : 'POST';

    const result = await apiRequest(url, { method, body: JSON.stringify(data) });
    if (result) {
        window.location.href = '/category-major';
    }
}

loadCategory();
</script>
{% endblock %}
