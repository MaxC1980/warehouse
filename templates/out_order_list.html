{% extends "base.html" %}

{% block title %}出库单管理 - 仓库管理系统{% endblock %}

{% block content %}
<div class="page-header">
    <h1>出库单管理</h1>
    <div class="page-actions">
        <a href="/out-orders/new" class="btn btn-primary">新建出库单</a>
    </div>
</div>

<div class="filter-bar">
    <select id="status-filter">
        <option value="">全部状态</option>
        <option value="pending">待审核</option>
        <option value="approved">已审核</option>
    </select>
    <span>出库日期</span>
    <input type="date" id="start-date">
    <input type="date" id="end-date">
    <button onclick="setThisMonth()" class="btn btn-sm">本月</button>
    <button onclick="setLastMonth()" class="btn btn-sm">上月</button>
    <select id="per-page" onchange="loadOrders()">
        <option value="15" selected>15条/页</option>
        <option value="50">50条/页</option>
        <option value="100">100条/页</option>
    </select>
    <button onclick="loadOrders()" class="btn btn-secondary">搜索</button>
</div>

<div class="data-table">
    <table>
        <thead>
            <tr>
                <th>单据编号</th>
                <th>部门</th>
                <th>领用人</th>
                <th>领用日期</th>
                <th>操作员</th>
                <th>状态</th>
                <th>创建时间</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="orders-tbody"></tbody>
    </table>
</div>

<div class="pagination" id="pagination"></div>
{% endblock %}

{% block scripts %}
<script>
let currentPage = 1;

async function loadOrders(page = 1) {
    currentPage = page;
    const status = document.getElementById('status-filter').value;
    const startDate = document.getElementById('start-date').value;
    const endDate = document.getElementById('end-date').value;
    const perPage = document.getElementById('per-page').value;

    const params = new URLSearchParams({ page, per_page: perPage });
    if (status) params.append('status', status);
    if (startDate) params.append('start_date', startDate);
    if (endDate) params.append('end_date', endDate);

    const data = await apiRequest(`/out-orders?${params}`);
    if (data) {
        renderOrders(data.items);
        renderPagination('pagination', data.total, data.page, perPage, 'loadOrders');
    }
}

function renderOrders(orders) {
    const tbody = document.getElementById('orders-tbody');
    if (orders.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8">暂无数据</td></tr>';
        return;
    }
    tbody.innerHTML = orders.map(o => `
        <tr>
            <td><a href="/out-orders/${o.id}/detail">${o.order_no}</a></td>
            <td>${o.department || ''}</td>
            <td>${o.receiver || ''}</td>
            <td>${o.receiver_date || ''}</td>
            <td>${o.operator_name || ''}</td>
            <td><span class="status ${o.status}">${getStatusText(o.status)}</span></td>
            <td>${o.created_at}</td>
            <td>
                ${o.status === 'pending' ? `
                    ${currentPermissionLevel >= 2 ? `<a href="/out-orders/${o.id}/edit" class="btn btn-sm">编辑</a>` : ''}
                    ${currentPermissionLevel >= 3 ? `<button onclick="approveOrder(${o.id})" class="btn btn-sm btn-success approve-btn">审核</button>` : ''}
                    ${currentPermissionLevel >= 2 ? `<button onclick="deleteOrder(${o.id})" class="btn btn-sm btn-danger">删除</button>` : ''}
                ` : `
                    <a href="/out-orders/${o.id}/detail" class="btn btn-sm">查看</a>
                `}
            </td>
        </tr>
    `).join('');
}

function getStatusText(status) {
    const map = {
        pending: '待审核',
        approved: '已审核',
        completed: '已完成'
    };
    return map[status] || status;
}

let currentPermissionLevel = 1;

async function approveOrder(id) {
    if (currentPermissionLevel < 3) {
        alert('无审核权限');
        return;
    }
    if (!confirm('确定要审核通过该出库单吗？')) return;
    const result = await apiRequest(`/out-orders/${id}/approve`, { method: 'POST' });
    if (result) {
        alert('审核成功');
        loadOrders(currentPage);
    } else {
        alert('审核失败，库存可能不足');
    }
}

async function deleteOrder(id) {
    if (currentPermissionLevel < 2) {
        alert('无删除权限');
        return;
    }
    if (!confirm('确定要删除该出库单吗？')) return;
    const result = await apiRequest(`/out-orders/${id}`, { method: 'DELETE' });
    if (result) {
        alert('删除成功');
        loadOrders(currentPage);
    } else {
        alert('删除失败');
    }
}

initDateRange('start-date', 'end-date', loadOrders);
setThisMonth();

// Get permission level
(async () => {
    const currentUser = await apiRequest('/auth/current_user');
    if (currentUser) {
        currentPermissionLevel = currentUser.permission_level || 1;
    }
})();
</script>
{% endblock %}
