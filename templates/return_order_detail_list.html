{% extends "base.html" %}

{% block title %}退库台账 - 仓库管理系统{% endblock %}

{% block content %}
<div class="page-header">
    <h1>退库台账</h1>
</div>

<div class="filter-bar">
    <select id="status-filter" onchange="loadOrders()">
        <option value="">全部状态</option>
        <option value="pending">待审核</option>
        <option value="approved">已审核</option>
    </select>
    <input type="text" id="out-order-no" placeholder="关联出库单号">
    <select id="per-page" onchange="loadOrders()">
        <option value="15" selected>15条/页</option>
        <option value="50">50条/页</option>
        <option value="100">100条/页</option>
    </select>
    <button onclick="loadOrders()" class="btn btn-secondary">搜索</button>
</div>

<div class="data-table">
    <table>
        <thead>
            <tr>
                <th>退库单号</th>
                <th>关联出库单</th>
                <th>部门</th>
                <th>退库人</th>
                <th>退库日期</th>
                <th>物料编码</th>
                <th>物料名称</th>
                <th>批次号</th>
                <th>退库数量</th>
                <th>状态</th>
            </tr>
        </thead>
        <tbody id="orders-tbody"></tbody>
    </table>
</div>

<div class="pagination" id="pagination"></div>
{% endblock %}

{% block scripts %}
<script>
let currentPage = 1;

async function loadOrders(page = 1) {
    currentPage = page;
    const status = document.getElementById('status-filter').value;
    const outOrderNo = document.getElementById('out-order-no').value.trim();
    const perPage = document.getElementById('per-page').value;

    const params = new URLSearchParams({ page, per_page: perPage });
    if (status) params.append('status', status);

    const data = await apiRequest(`/return-orders?${params}`);
    if (data) {
        // Filter by out_order_no client-side if provided
        let orders = data.items;
        if (outOrderNo) {
            orders = orders.filter(o => o.out_order_no && o.out_order_no.includes(outOrderNo));
        }
        renderOrders(orders);
        renderPagination('pagination', data.total, data.page, perPage, 'loadOrders');
    }
}

function renderOrders(orders) {
    const tbody = document.getElementById('orders-tbody');
    if (orders.length === 0) {
        tbody.innerHTML = '<tr><td colspan="10">暂无数据</td></tr>';
        return;
    }

    let html = '';
    orders.forEach(o => {
        if (!o.items || o.items.length === 0) {
            html += `<tr>
                <td><a href="/return-orders/${o.id}/detail">${o.order_no}</a></td>
                <td>${o.out_order_no || ''}</td>
                <td>${o.department || ''}</td>
                <td>${o.receiver || ''}</td>
                <td>${o.receiver_date || ''}</td>
                <td colspan="3"></td>
                <td><span class="status ${o.status}">${getStatusText(o.status)}</span></td>
            </tr>`;
        } else {
            o.items.forEach((item, idx) => {
                if (idx === 0) {
                    html += `<tr>
                        <td rowspan="${o.items.length}"><a href="/return-orders/${o.id}/detail">${o.order_no}</a></td>
                        <td rowspan="${o.items.length}">${o.out_order_no || ''}</td>
                        <td rowspan="${o.items.length}">${o.department || ''}</td>
                        <td rowspan="${o.items.length}">${o.receiver || ''}</td>
                        <td rowspan="${o.items.length}">${o.receiver_date || ''}</td>
                        <td>${item.material_code || ''}</td>
                        <td>${item.material_name || ''}</td>
                        <td>${item.batch_no || ''}</td>
                        <td>${item.return_quantity}</td>
                        <td rowspan="${o.items.length}"><span class="status ${o.status}">${getStatusText(o.status)}</span></td>
                    </tr>`;
                } else {
                    html += `<tr>
                        <td>${item.material_code || ''}</td>
                        <td>${item.material_name || ''}</td>
                        <td>${item.batch_no || ''}</td>
                        <td>${item.return_quantity}</td>
                    </tr>`;
                }
            });
        }
    });
    tbody.innerHTML = html;
}

function getStatusText(status) {
    const map = {
        pending: '待审核',
        approved: '已审核',
        cancelled: '已取消'
    };
    return map[status] || status;
}

loadOrders();
</script>
{% endblock %}
