{% extends "base.html" %}

{% block title %}{{ '编辑' if supplier_id else '新增' }}供应商 - 仓库管理系统{% endblock %}

{% block content %}
<div class="page-header">
    <h1>{{ '编辑' if supplier_id else '新增' }}供应商</h1>
</div>

<form id="supplier-form" onsubmit="handleSubmit(event)">
    <div class="form-grid">
        <div class="form-group">
            <label>供应商名称 *</label>
            <input type="text" name="name" required>
        </div>
        <div class="form-group">
            <label>联系人</label>
            <input type="text" name="contact">
        </div>
        <div class="form-group">
            <label>电话</label>
            <input type="text" name="phone">
        </div>
        <div class="form-group">
            <label>地址</label>
            <input type="text" name="address">
        </div>
    </div>

    <div class="form-actions">
        <button type="submit" class="btn btn-primary">保存</button>
        <a href="/suppliers" class="btn btn-secondary">取消</a>
    </div>
</form>
{% endblock %}

{% block scripts %}
<script>
const supplierId = {{ supplier_id if supplier_id else 'null' }};

async function loadSupplier() {
    if (!supplierId) return;
    const supplier = await apiRequest(`/suppliers/${supplierId}`);
    if (supplier) {
        const form = document.getElementById('supplier-form');
        form.name.value = supplier.name;
        form.contact.value = supplier.contact || '';
        form.phone.value = supplier.phone || '';
        form.address.value = supplier.address || '';
    }
}

async function handleSubmit(e) {
    e.preventDefault();
    const form = e.target;
    const data = {
        name: form.name.value,
        contact: form.contact.value || null,
        phone: form.phone.value || null,
        address: form.address.value || null
    };

    const url = supplierId ? `/suppliers/${supplierId}` : '/suppliers';
    const method = supplierId ? 'PUT' : 'POST';

    const result = await apiRequest(url, { method, body: JSON.stringify(data) });
    if (result) {
        window.location.href = '/suppliers';
    }
}

loadSupplier();
</script>
{% endblock %}
