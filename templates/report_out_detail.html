{% extends "base.html" %}

{% block title %}出库明细报表 - 仓库管理系统{% endblock %}

{% block content %}
<div class="page-header">
    <h1>出库明细报表</h1>
    <div class="page-actions">
        <button onclick="exportExcel()" class="btn btn-secondary">导出Excel</button>
    </div>
</div>

<div class="filter-bar">
    <button onclick="setThisWeek()" class="btn btn-sm">本周</button>
    <button onclick="setThisMonth()" class="btn btn-sm">本月</button>
    <input type="date" id="date-from">
    <input type="date" id="date-to">
    <select id="per-page" onchange="loadReport()">
        <option value="15" selected>15条/页</option>
        <option value="50">50条/页</option>
        <option value="100">100条/页</option>
    </select>
    <button onclick="loadReport()" class="btn btn-secondary">搜索</button>
</div>

<div class="data-table">
    <table>
        <thead>
            <tr>
                <th>出库单号</th>
                <th>出库日期</th>
                <th>部门</th>
                <th>物料编码</th>
                <th>物料名称</th>
                <th>品牌</th>
                <th>规格</th>
                <th>批次号</th>
                <th>数量</th>
                <th>单价</th>
                <th>金额</th>
                <th>操作员</th>
            </tr>
        </thead>
        <tbody id="report-tbody"></tbody>
    </table>
</div>

<div class="pagination" id="pagination"></div>
{% endblock %}

{% block scripts %}
<script>
let currentPage = 1;

async function loadReport(page = 1) {
    currentPage = page;
    const dateFrom = document.getElementById('date-from').value;
    const dateTo = document.getElementById('date-to').value;
    const perPage = document.getElementById('per-page').value;

    const params = new URLSearchParams({ page, per_page: perPage });
    if (dateFrom) params.append('date_from', dateFrom);
    if (dateTo) params.append('date_to', dateTo);

    const data = await apiRequest(`/reports/out-detail?${params}`);
    if (data) {
        renderReport(data.items);
        renderPagination('pagination', data.total, data.page, perPage, 'loadReport');
    }
}

function renderReport(items) {
    const tbody = document.getElementById('report-tbody');
    if (items.length === 0) {
        tbody.innerHTML = '<tr><td colspan="12">暂无数据</td></tr>';
        return;
    }
    tbody.innerHTML = items.map(item => `
        <tr>
            <td>${item.order_no}</td>
            <td>${item.created_at}</td>
            <td>${item.department || ''}</td>
            <td>${item.material_code}</td>
            <td>${item.material_name}</td>
            <td>${item.manufacturer || ''}</td>
            <td>${item.spec || ''}</td>
            <td>${item.batch_no || ''}</td>
            <td>${item.actual_quantity}</td>
            <td>${item.unit_price}</td>
            <td>${item.amount}</td>
            <td>${item.operator || ''}</td>
        </tr>
    `).join('');
}

function exportExcel() {
    const dateFrom = document.getElementById('date-from').value;
    const dateTo = document.getElementById('date-to').value;
    let url = '/api/reports/out-detail/export?';
    if (dateFrom) url += 'date_from=' + dateFrom + '&';
    if (dateTo) url += 'date_to=' + dateTo;
    url += 'per_page=10000';
    window.location.href = url;
}

(function() {
    initDateRange('date-from', 'date-to', loadReport);
    setThisMonth();
})();
</script>
{% endblock %}
