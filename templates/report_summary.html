{% extends "base.html" %}

{% block title %}汇总统计 - 仓库管理系统{% endblock %}

{% block content %}
<div class="page-header">
    <h1>汇总统计</h1>
</div>

<div class="filter-bar">
    <button onclick="setThisWeek()" class="btn btn-sm">本周</button>
    <button onclick="setThisMonth()" class="btn btn-sm">本月</button>
    <input type="date" id="date-from">
    <input type="date" id="date-to">
    <button onclick="loadReport()" class="btn btn-secondary">搜索</button>
</div>

<div class="stats-grid" id="stats-grid">
    <div class="stat-card">
        <h3>入库总数量</h3>
        <div class="stat-value" id="in-count">-</div>
    </div>
    <div class="stat-card">
        <h3>入库总金额</h3>
        <div class="stat-value" id="in-amount">-</div>
    </div>
    <div class="stat-card">
        <h3>出库总数量</h3>
        <div class="stat-value" id="out-count">-</div>
    </div>
    <div class="stat-card">
        <h3>出库总金额</h3>
        <div class="stat-value" id="out-amount">-</div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function formatDate(d) {
    const pad = n => n < 10 ? '0' + n : n;
    return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate());
}

function setThisWeek() {
    const today = new Date();
    const dayOfWeek = today.getDay(); // 0=周日
    const monday = new Date(today);
    monday.setDate(today.getDate() - (dayOfWeek === 0 ? 6 : dayOfWeek - 1));
    document.getElementById('date-from').value = formatDate(monday);
    document.getElementById('date-to').value = formatDate(today);
    loadReport();
}

function setThisMonth() {
    const today = new Date();
    const firstDay = new Date(today.getFullYear(), today.getMonth(), 1);
    document.getElementById('date-from').value = formatDate(firstDay);
    document.getElementById('date-to').value = formatDate(today);
    loadReport();
}

async function loadReport() {
    const dateFrom = document.getElementById('date-from').value;
    const dateTo = document.getElementById('date-to').value;

    const params = new URLSearchParams();
    if (dateFrom) params.append('date_from', dateFrom);
    if (dateTo) params.append('date_to', dateTo);

    const data = await apiRequest(`/reports/summary?${params}`);
    if (data) {
        document.getElementById('in-count').textContent = data.in_order_count || 0;
        document.getElementById('in-amount').textContent = (data.in_order_amount || 0).toFixed(2);
        document.getElementById('out-count').textContent = data.out_order_count || 0;
        document.getElementById('out-amount').textContent = (data.out_order_amount || 0).toFixed(2);
    }
}

(function() {
    const today = new Date();
    const firstDay = new Date(today.getFullYear(), today.getMonth(), 1);
    document.getElementById('date-from').value = formatDate(firstDay);
    document.getElementById('date-to').value = formatDate(today);
    loadReport();
})();
</script>
{% endblock %}
